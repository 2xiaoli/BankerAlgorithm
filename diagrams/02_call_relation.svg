<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f766e"/>
    </marker>
    <style>
      .title{font:700 28px "Microsoft YaHei",Arial,sans-serif;fill:#111827}
      .box{fill:#ecfdf5;stroke:#0f766e;stroke-width:2;rx:12;ry:12}
      .data{fill:#fff7ed;stroke:#ea580c;stroke-width:2;rx:12;ry:12}
      .text{font:18px "Microsoft YaHei",Arial,sans-serif;fill:#111827}
      .small{font:15px "Microsoft YaHei",Arial,sans-serif;fill:#374151}
      .line{stroke:#0f766e;stroke-width:2.5;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="980" height="560" fill="#ffffff"/>
  <text x="490" y="46" text-anchor="middle" class="title">系统整体调用关系图</text>

  <rect x="405" y="80" width="170" height="80" class="box"/>
  <text x="490" y="113" text-anchor="middle" class="text">main.cpp</text>
  <text x="490" y="140" text-anchor="middle" class="small">程序入口</text>

  <rect x="180" y="210" width="180" height="90" class="box"/>
  <text x="270" y="247" text-anchor="middle" class="text">Encoding</text>
  <text x="270" y="274" text-anchor="middle" class="small">控制台编码设置</text>

  <rect x="405" y="210" width="170" height="90" class="box"/>
  <text x="490" y="247" text-anchor="middle" class="text">ConsoleUI</text>
  <text x="490" y="274" text-anchor="middle" class="small">终端界面</text>

  <rect x="170" y="370" width="190" height="90" class="box"/>
  <text x="265" y="407" text-anchor="middle" class="text">CommandParser</text>
  <text x="265" y="434" text-anchor="middle" class="small">命令解析</text>

  <rect x="405" y="370" width="170" height="90" class="box"/>
  <text x="490" y="407" text-anchor="middle" class="text">BankerSystem</text>
  <text x="490" y="434" text-anchor="middle" class="small">算法核心</text>

  <rect x="640" y="370" width="170" height="90" class="box"/>
  <text x="725" y="407" text-anchor="middle" class="text">Types.h</text>
  <text x="725" y="434" text-anchor="middle" class="small">公共类型定义</text>

  <rect x="640" y="210" width="220" height="90" class="data"/>
  <text x="750" y="247" text-anchor="middle" class="text">资源数据</text>
  <text x="750" y="274" text-anchor="middle" class="small">Available / Max / Allocation / Need</text>

  <path d="M 430 160 L 320 210" class="line"/>
  <path d="M 490 160 L 490 210" class="line"/>
  <path d="M 450 300 L 315 370" class="line"/>
  <path d="M 490 300 L 490 370" class="line"/>
  <path d="M 545 300 L 680 370" class="line"/>
  <path d="M 575 255 L 640 255" class="line"/>
  <path d="M 575 415 L 640 415" class="line"/>
</svg>
