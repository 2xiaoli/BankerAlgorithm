<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="700" viewBox="0 0 1080 700">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4b5563"/>
    </marker>
    <style>
      .title{font:700 28px "Microsoft YaHei",Arial,sans-serif;fill:#111827}
      .entity{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:10;ry:10}
      .rel{fill:#eef2ff;stroke:#4f46e5;stroke-width:2;rx:10;ry:10}
      .text{font:18px "Microsoft YaHei",Arial,sans-serif;fill:#111827}
      .small{font:14px "Microsoft YaHei",Arial,sans-serif;fill:#374151}
      .line{stroke:#4b5563;stroke-width:2;fill:none;marker-end:url(#arrow)}
      .label{font:14px "Microsoft YaHei",Arial,sans-serif;fill:#1f2937}
    </style>
  </defs>
  <rect width="1080" height="700" fill="#ffffff"/>
  <text x="540" y="46" text-anchor="middle" class="title">银行家算法资源管理 E-R 图</text>

  <rect x="450" y="90" width="180" height="80" class="entity"/>
  <text x="540" y="123" text-anchor="middle" class="text">SYSTEM</text>
  <text x="540" y="150" text-anchor="middle" class="small">系统</text>

  <rect x="170" y="260" width="180" height="80" class="entity"/>
  <text x="260" y="293" text-anchor="middle" class="text">PROCESS</text>
  <text x="260" y="320" text-anchor="middle" class="small">进程 pid</text>

  <rect x="730" y="260" width="180" height="80" class="entity"/>
  <text x="820" y="293" text-anchor="middle" class="text">RESOURCE</text>
  <text x="820" y="320" text-anchor="middle" class="small">资源 rid</text>

  <rect x="90" y="500" width="180" height="80" class="rel"/>
  <text x="180" y="533" text-anchor="middle" class="text">ALLOCATION</text>
  <text x="180" y="560" text-anchor="middle" class="small">已分配资源</text>

  <rect x="450" y="500" width="180" height="80" class="rel"/>
  <text x="540" y="533" text-anchor="middle" class="text">NEED</text>
  <text x="540" y="560" text-anchor="middle" class="small">剩余需求</text>

  <rect x="810" y="500" width="180" height="80" class="rel"/>
  <text x="900" y="533" text-anchor="middle" class="text">REQUEST</text>
  <text x="900" y="560" text-anchor="middle" class="small">资源请求</text>

  <path d="M 450 130 L 350 260" class="line"/>
  <text x="375" y="190" class="label">manages</text>
  <path d="M 630 130 L 730 260" class="line"/>
  <text x="688" y="190" class="label">contains</text>

  <path d="M 240 340 L 180 500" class="line"/>
  <text x="180" y="430" class="label">owns</text>
  <path d="M 300 340 L 540 500" class="line"/>
  <text x="420" y="430" class="label">requires</text>
  <path d="M 350 315 L 810 520" class="line"/>
  <text x="570" y="405" class="label">submits</text>

  <path d="M 800 340 L 270 520" class="line"/>
  <text x="530" y="455" class="label">allocated_as</text>
  <path d="M 820 340 L 630 500" class="line"/>
  <text x="720" y="435" class="label">needed_as</text>
  <path d="M 845 340 L 900 500" class="line"/>
  <text x="888" y="430" class="label">requested_as</text>
</svg>
