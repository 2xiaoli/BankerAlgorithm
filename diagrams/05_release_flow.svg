<svg xmlns="http://www.w3.org/2000/svg" width="960" height="760" viewBox="0 0 960 760">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0891b2"/>
    </marker>
    <style>
      .title{font:700 28px "Microsoft YaHei",Arial,sans-serif;fill:#111827}
      .box{fill:#ecfeff;stroke:#0891b2;stroke-width:2;rx:12;ry:12}
      .decision{fill:#fefce8;stroke:#ca8a04;stroke-width:2}
      .error{fill:#fef2f2;stroke:#dc2626;stroke-width:2;rx:12;ry:12}
      .success{fill:#ecfdf5;stroke:#059669;stroke-width:2;rx:12;ry:12}
      .text{font:17px "Microsoft YaHei",Arial,sans-serif;fill:#111827}
      .small{font:14px "Microsoft YaHei",Arial,sans-serif;fill:#374151}
      .line{stroke:#0891b2;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
      .label{font:14px "Microsoft YaHei",Arial,sans-serif;fill:#1f2937}
    </style>
  </defs>
  <rect width="960" height="760" fill="#ffffff"/>
  <text x="480" y="46" text-anchor="middle" class="title">资源释放流程图</text>

  <rect x="330" y="80" width="300" height="70" class="box"/>
  <text x="480" y="122" text-anchor="middle" class="text">进程 Pi 发出 Release</text>

  <polygon points="480,185 620,245 480,305 340,245" class="decision"/>
  <text x="480" y="250" text-anchor="middle" class="text">系统是否已初始化？</text>
  <rect x="680" y="210" width="220" height="70" class="error"/>
  <text x="790" y="252" text-anchor="middle" class="text">提示先初始化系统</text>

  <polygon points="480,340 620,400 480,460 340,400" class="decision"/>
  <text x="480" y="405" text-anchor="middle" class="text">进程编号是否合法？</text>
  <rect x="680" y="365" width="220" height="70" class="error"/>
  <text x="790" y="407" text-anchor="middle" class="text">提示进程编号越界</text>

  <polygon points="480,495 620,555 480,615 340,555" class="decision"/>
  <text x="480" y="560" text-anchor="middle" class="text">Release 长度是否正确？</text>
  <rect x="680" y="520" width="220" height="70" class="error"/>
  <text x="790" y="562" text-anchor="middle" class="text">提示向量长度错误</text>

  <polygon points="220,495 340,555 220,615 100,555" class="decision"/>
  <text x="220" y="552" text-anchor="middle" class="text">Release &lt;=</text>
  <text x="220" y="578" text-anchor="middle" class="text">Allocation[i]？</text>
  <rect x="50" y="650" width="270" height="70" class="error"/>
  <text x="185" y="678" text-anchor="middle" class="text">拒绝释放</text>
  <text x="185" y="704" text-anchor="middle" class="small">释放量超过已分配资源</text>

  <rect x="390" y="650" width="270" height="80" class="box"/>
  <text x="525" y="680" text-anchor="middle" class="text">更新资源状态</text>
  <text x="525" y="706" text-anchor="middle" class="small">Allocation -= Release，Available += Release</text>

  <rect x="700" y="650" width="220" height="80" class="success"/>
  <text x="810" y="680" text-anchor="middle" class="text">输出释放成功</text>
  <text x="810" y="706" text-anchor="middle" class="small">并显示当前系统状态</text>

  <path d="M 480 150 L 480 185" class="line"/>
  <path d="M 620 245 L 680 245" class="line"/>
  <text x="635" y="226" class="label">否</text>
  <path d="M 480 305 L 480 340" class="line"/>
  <text x="495" y="325" class="label">是</text>
  <path d="M 620 400 L 680 400" class="line"/>
  <text x="635" y="381" class="label">否</text>
  <path d="M 480 460 L 480 495" class="line"/>
  <path d="M 620 555 L 680 555" class="line"/>
  <text x="635" y="536" class="label">否</text>
  <path d="M 480 615 C 430 645 330 620 280 595" class="line"/>
  <text x="388" y="630" class="label">是</text>
  <path d="M 220 615 L 185 650" class="line"/>
  <text x="205" y="640" class="label">否</text>
  <path d="M 340 555 C 410 575 470 620 510 650" class="line"/>
  <text x="360" y="538" class="label">是</text>
  <path d="M 660 690 L 700 690" class="line"/>
</svg>
