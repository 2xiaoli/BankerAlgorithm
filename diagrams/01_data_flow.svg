<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <style>
      .title{font:700 28px "Microsoft YaHei",Arial,sans-serif;fill:#111827}
      .box{fill:#eff6ff;stroke:#2563eb;stroke-width:2;rx:12;ry:12}
      .store{fill:#fef3c7;stroke:#d97706;stroke-width:2}
      .text{font:18px "Microsoft YaHei",Arial,sans-serif;fill:#111827}
      .small{font:15px "Microsoft YaHei",Arial,sans-serif;fill:#374151}
      .line{stroke:#2563eb;stroke-width:2.5;fill:none;marker-end:url(#arrow)}
      .label{font:14px "Microsoft YaHei",Arial,sans-serif;fill:#1f2937}
    </style>
  </defs>
  <rect width="1200" height="420" fill="#ffffff"/>
  <text x="600" y="46" text-anchor="middle" class="title">银行家算法资源分配模拟系统数据流图</text>

  <rect x="40" y="150" width="130" height="80" class="box"/>
  <text x="105" y="197" text-anchor="middle" class="text">用户</text>

  <rect x="250" y="130" width="180" height="120" class="box"/>
  <text x="340" y="180" text-anchor="middle" class="text">ConsoleUI</text>
  <text x="340" y="210" text-anchor="middle" class="small">终端交互模块</text>

  <rect x="520" y="130" width="190" height="120" class="box"/>
  <text x="615" y="180" text-anchor="middle" class="text">CommandParser</text>
  <text x="615" y="210" text-anchor="middle" class="small">命令解析模块</text>

  <rect x="800" y="130" width="190" height="120" class="box"/>
  <text x="895" y="180" text-anchor="middle" class="text">BankerSystem</text>
  <text x="895" y="210" text-anchor="middle" class="small">银行家算法模块</text>

  <path d="M 1080 125 C 1130 125 1130 255 1080 255 C 1030 255 1030 125 1080 125" class="store"/>
  <text x="1080" y="176" text-anchor="middle" class="text">系统资源状态</text>
  <text x="1080" y="204" text-anchor="middle" class="small">Available / Max</text>
  <text x="1080" y="228" text-anchor="middle" class="small">Allocation / Need</text>

  <path d="M 170 190 L 250 190" class="line"/>
  <text x="210" y="160" text-anchor="middle" class="label">输入命令和数据</text>

  <path d="M 430 190 L 520 190" class="line"/>
  <text x="475" y="160" text-anchor="middle" class="label">原始命令字符串</text>

  <path d="M 710 190 L 800 190" class="line"/>
  <text x="755" y="160" text-anchor="middle" class="label">合法命令对象</text>

  <path d="M 990 190 L 1030 190" class="line"/>
  <text x="1010" y="160" text-anchor="middle" class="label">读写</text>

  <path d="M 895 250 C 860 330 410 330 340 250" class="line"/>
  <text x="620" y="355" text-anchor="middle" class="label">操作结果 / 安全序列 / 错误信息</text>

  <path d="M 250 220 C 190 285 110 285 105 230" class="line"/>
  <text x="170" y="310" text-anchor="middle" class="label">显示矩阵、提示信息和安全序列</text>
</svg>
